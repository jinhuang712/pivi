<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Local Voice Chat - Channel UI Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    body { background-color: #1e1f22; color: #f3f4f6; }
  </style>
</head>
<body class="h-screen w-screen flex overflow-hidden font-sans">

  <!-- 左侧：成员与本地控制区 -->
  <aside class="w-64 bg-[#2b2d31] flex flex-col border-r border-[#1e1f22]">
    <!-- 房间头部 -->
    <div class="h-12 border-b border-[#1e1f22] flex items-center px-4 font-bold shadow-sm">
      ⚔️ 周末电竞开黑房
    </div>

    <!-- 成员列表 -->
    <div class="flex-1 overflow-y-auto p-2 space-y-1">
      
      <!-- 成员项：房主自己 -->
      <div class="flex items-center justify-between p-2 rounded hover:bg-[#3f4147] group cursor-pointer">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center font-bold">我</div>
          <span class="text-sm font-medium text-blue-400">HuangJin (房主)</span>
        </div>
        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> <!-- 说话指示灯 -->
      </div>

      <!-- 成员项：其他玩家 -->
      <div class="flex flex-col p-2 rounded hover:bg-[#3f4147] group cursor-pointer transition-all">
        <div class="flex items-center justify-between">
          <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-gray-500 rounded-full flex items-center justify-center font-bold">A</div>
            <span class="text-sm font-medium">Player A</span>
          </div>
          <!-- 悬浮时显示的快捷操作：本地屏蔽 -->
          <button class="hidden group-hover:block text-gray-400 hover:text-red-400 text-xs" title="本地屏蔽">
            🔇
          </button>
        </div>
        <!-- 悬浮时显示的独立音量调节 -->
        <div class="hidden group-hover:flex items-center mt-2 space-x-2 px-1">
          <span class="text-[10px] text-gray-400">音量</span>
          <input type="range" min="0" max="200" value="100" class="w-full h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer">
        </div>
      </div>

    </div>

    <!-- 底部：本地全局控制面板 -->
    <div class="h-14 bg-[#232428] flex items-center justify-between px-3">
      <div class="flex items-center space-x-2">
        <div class="w-8 h-8 bg-green-600 rounded-full flex items-center justify-center text-sm">我</div>
        <div class="flex flex-col">
          <span class="text-xs font-bold leading-tight">HuangJin</span>
          <span class="text-[10px] text-green-400 leading-tight">在线</span>
        </div>
      </div>
      <div class="flex space-x-2 text-gray-400">
        <button class="hover:text-white p-1 rounded hover:bg-gray-700" title="麦克风开关">🎤</button>
        <button class="hover:text-white p-1 rounded hover:bg-gray-700" title="扬声器开关">🎧</button>
        <button class="hover:text-white p-1 rounded hover:bg-gray-700" title="设置" onclick="window.location.href='demo-settings.html'">⚙️</button>
      </div>
    </div>
  </aside>

  <!-- 右侧：主交互区 -->
  <main class="flex-1 flex flex-col relative bg-[#313338]">
    <!-- 顶部导航与网络面板指示器 -->
    <div class="h-12 border-b border-[#2b2d31] flex justify-between items-center px-4">
      <div class="flex space-x-4 text-gray-400 text-sm">
        <button class="hover:text-white font-medium border-b-2 border-indigo-500 pb-1">屏幕共享 📺</button>
      </div>
      <!-- 网络状态看板开关 -->
      <div class="flex items-center space-x-2 text-xs text-green-400 bg-[#2b2d31] px-2 py-1 rounded cursor-pointer hover:bg-[#1e1f22]" title="点击展开/收起网络详情">
        <span>Ping: 24ms</span>
        <span class="text-gray-500">|</span>
        <span>P2P直连</span>
      </div>
    </div>

    <!-- 屏幕共享预览占位区 -->
    <div class="flex-1 flex items-center justify-center p-4">
      <div class="w-full h-full border-2 border-dashed border-gray-600 rounded-lg flex flex-col items-center justify-center text-gray-500 bg-[#2b2d31]">
        <span class="text-4xl mb-2">🎮</span>
        <p>当前无人共享屏幕</p>
        <button class="mt-4 px-4 py-2 bg-indigo-500 hover:bg-indigo-600 text-white rounded text-sm font-medium transition-colors">
          开始共享我的屏幕
        </button>
      </div>
    </div>

    <!-- 底部：聊天框 (Chatbox) -->
    <div class="h-64 border-t border-[#2b2d31] flex flex-col">
      <!-- 消息列表 -->
      <div class="flex-1 p-4 overflow-y-auto space-y-4">
        <div class="flex space-x-3">
          <div class="w-10 h-10 bg-gray-500 rounded-full flex-shrink-0 flex items-center justify-center font-bold">A</div>
          <div>
            <div class="flex items-baseline space-x-2">
              <span class="font-medium text-sm text-blue-400">Player A</span>
              <span class="text-xs text-gray-500">14:32</span>
            </div>
            <p class="text-sm text-gray-300 mt-1">刚打到的战利品看看！</p>
            <div class="mt-2 w-48 h-32 bg-[#1e1f22] rounded-md border border-gray-600 flex items-center justify-center text-xs text-gray-500">
              [图片预览]
            </div>
          </div>
        </div>
      </div>
      
      <!-- 输入框区域 -->
      <div class="p-4 pt-2 relative">
        <!-- 错误提示气泡（默认隐藏，发送大图时显示） -->
        <div class="absolute -top-8 left-4 bg-red-500 text-white text-xs px-3 py-1 rounded shadow-lg hidden">
          ⚠️ 图片大小不能超过 5MB
        </div>
        
        <div class="bg-[#383a40] rounded-lg flex items-center p-2 focus-within:ring-1 ring-indigo-500">
          <button class="text-gray-400 hover:text-white px-2 cursor-pointer transition-colors" title="上传图片/文件">
            <span class="text-xl">⊕</span>
          </button>
          <input type="text" placeholder="输入消息... (支持 Ctrl+V 粘贴截图)" class="flex-1 bg-transparent border-none outline-none text-sm text-gray-200 px-2 placeholder-gray-500">
          <button class="text-gray-400 hover:text-indigo-400 px-2 cursor-pointer transition-colors" title="发送">
            <svg class="w-5 h-5 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
