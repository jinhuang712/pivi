<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Local Voice Chat - Settings Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #313338; color: #f3f4f6; }
  </style>
</head>
<body class="h-screen w-screen flex justify-center items-center font-sans">

  <!-- 模拟弹窗遮罩 -->
  <div class="fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center">
    
    <!-- 设置面板容器 -->
    <div class="bg-[#313338] w-[800px] h-[600px] rounded-lg shadow-2xl flex overflow-hidden">
      
      <!-- 左侧菜单 -->
      <aside class="w-1/3 bg-[#2b2d31] p-4 flex flex-col">
        <h2 class="text-xs font-bold text-gray-400 mb-2 px-2">用户设置</h2>
        <a href="#" class="block px-2 py-1.5 text-sm text-gray-300 hover:bg-[#3f4147] hover:text-white rounded">我的账号</a>
        <a href="#" class="block px-2 py-1.5 text-sm bg-[#3f4147] text-white rounded">语音与设备</a>
        <a href="#" class="block px-2 py-1.5 text-sm text-gray-300 hover:bg-[#3f4147] hover:text-white rounded">快捷键</a>

        <div class="my-4 border-t border-gray-700"></div>

        <h2 class="text-xs font-bold text-gray-400 mb-2 px-2">房主管理面板</h2>
        <a href="#" class="block px-2 py-1.5 text-sm text-gray-300 hover:bg-[#3f4147] hover:text-white rounded">房间设置 (口令)</a>
        <a href="#" class="block px-2 py-1.5 text-sm text-gray-300 hover:bg-[#3f4147] hover:text-white rounded text-red-400">封禁与黑名单</a>
        <a href="#" class="block px-2 py-1.5 text-sm text-gray-300 hover:bg-[#3f4147] hover:text-white rounded text-yellow-400">移交房主权限</a>
      </aside>

      <!-- 右侧内容区 -->
      <main class="flex-1 p-8 overflow-y-auto relative">
        <!-- 关闭按钮 -->
        <button class="absolute top-4 right-4 text-gray-400 hover:text-white text-xl" title="关闭" onclick="window.location.href='demo-channel.html'">×</button>

        <h1 class="text-xl font-bold mb-6 text-white">语音与设备</h1>

        <!-- 输入设备 -->
        <div class="mb-6">
          <label class="block text-xs font-bold text-gray-400 mb-2">输入设备 (麦克风)</label>
          <select class="w-full bg-[#1e1f22] border border-gray-700 text-sm rounded p-2 text-gray-200 focus:outline-none focus:border-indigo-500">
            <option>Default - MacBook Pro Microphone</option>
            <option>External USB Mic</option>
          </select>
        </div>

        <!-- 输出设备 -->
        <div class="mb-6">
          <label class="block text-xs font-bold text-gray-400 mb-2">输出设备 (扬声器)</label>
          <select class="w-full bg-[#1e1f22] border border-gray-700 text-sm rounded p-2 text-gray-200 focus:outline-none focus:border-indigo-500">
            <option>Default - MacBook Pro Speakers</option>
            <option>AirPods Pro</option>
          </select>
        </div>

        <div class="my-6 border-t border-gray-700"></div>

        <!-- 输入模式 -->
        <h2 class="text-sm font-bold text-gray-200 mb-4">输入模式</h2>
        <div class="flex space-x-4 mb-4">
          <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
            <input type="radio" name="input_mode" class="text-indigo-500 bg-gray-800" checked>
            <span>语音激活 (VAD)</span>
          </label>
          <label class="flex items-center space-x-2 text-sm text-gray-300 cursor-pointer">
            <input type="radio" name="input_mode" class="text-indigo-500 bg-gray-800">
            <span>按键说话 (PTT)</span>
          </label>
        </div>

        <!-- 模拟黑名单区 (作为 Demo 示意) -->
        <div class="my-6 border-t border-gray-700"></div>
        <h2 class="text-sm font-bold text-red-400 mb-4">房主操作预览：黑名单管理</h2>
        <div class="bg-[#1e1f22] rounded border border-gray-700 p-4">
          <div class="flex justify-between items-center mb-2">
            <div class="flex items-center space-x-2">
              <span class="text-sm text-gray-300">Player B</span>
              <span class="text-xs text-gray-500">UUID: 1234-5678...</span>
            </div>
            <button class="px-3 py-1 bg-gray-700 hover:bg-gray-600 text-xs rounded text-white transition-colors">解除封禁</button>
          </div>
          <div class="text-xs text-gray-500 mt-1">封禁原因: 恶意刷屏</div>
        </div>

      </main>
    </div>
  </div>

</body>
</html>
